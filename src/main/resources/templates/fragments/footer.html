<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<body>
<div th:fragment="footer">
    <footer class="bg-black text-white pt-5 pb-4 mt-5">

        <div class="container">
            <div class="row">
                <!-- Logo / About -->
                <div class="col-md-3 col-lg-3 col-xl-3 mx-auto mt-3">
                    <h5 class="text-uppercase mb-4 fw-bold">Expenses Tracker</h5>
                    <p>
                        Track your daily expenses, manage budgets, and stay financially smart 💰
                    </p>
                </div>
                <!-- Features -->
                <div class="col-md-2 col-lg-2 col-xl-2 mx-auto mt-3">
                    <h6 class="text-uppercase mb-4 fw-bold">Features</h6>
                    <p><a th:href="@{/dashboard}" class="text-white text-decoration-none">Dashboard</a></p>
                    <p><a th:href="@{/add-expense}" class="text-white text-decoration-none">Add Expense</a></p>
                    <p><a th:href="@{/view-expenses}" class="text-white text-decoration-none">View Expenses</a></p>
                    <p><a th:href="@{/reports}" class="text-white text-decoration-none">Reports</a></p>
                </div>
                <!-- User -->
                <div class="col-md-2 col-lg-2 col-xl-2 mx-auto mt-3">
                    <h6 class="text-uppercase mb-4 fw-bold">User</h6>
                    <p><a th:href="@{/profile}" class="text-white text-decoration-none">Profile</a></p>
                    <p><a th:href="@{/settings}" class="text-white text-decoration-none">Settings</a></p>
                    <p><a th:href="@{/logout}" class="text-white text-decoration-none">Logout</a></p>
                </div>
                <!-- Company -->
                <div class="col-md-2 col-lg-2 col-xl-2 mx-auto mt-3">
                    <h6 class="text-uppercase mb-4 fw-bold">Company</h6>
                    <p><a th:href="@{/about}" class="text-white text-decoration-none">About Us</a></p>
                    <p><a th:href="@{/contact}" class="text-white text-decoration-none">Contact</a></p>
                    <p><a th:href="@{/privacy}" class="text-white text-decoration-none">Privacy Policy</a></p>
                </div>

            </div>
            <!-- Divider -->
            <hr class="mb-4">
            <!-- Social + Copyright -->
            <div class="row align-items-center">
                <!-- Social Icons -->
                <div class="col-md-6 col-lg-6 text-center text-md-start mb-3 mb-md-0">
                    <a href="https://www.facebook.com" class="btn btn-outline-light btn-sm rounded-circle me-2">
                        <i class="bi bi-facebook"></i>
                    </a>
                    <a href="https://www.instagram.com" class="btn btn-outline-light btn-sm rounded-circle me-2">
                        <i class="bi bi-twitter"></i>
                    </a>
                    <a href="https://www.instagram.com" class="btn btn-outline-light btn-sm rounded-circle me-2">
                        <i class="bi bi-instagram"></i>
                    </a>
                    <a href="https://www.linkedin.com" class="btn btn-outline-light btn-sm rounded-circle">
                        <i class="bi bi-linkedin"></i>
                    </a>
                </div>
                <!-- Copyright -->
                <div class="col-md-6 col-lg-6 text-center text-md-end">
                    <p class="mb-0">
                        © 2026 Expenses Tracker | All Rights Reserved | Bharti Rai
                    </p>
                </div>
            </div>
        </div>
    </footer>
</div>
</body>
</html>
