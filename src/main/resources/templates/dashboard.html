    <link rel="icon" type="image/x-icon" th:href="@{/assets/favicon.ico}"/>
    <!-- Font Awesome icons (free version)-->

          crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css"/>
    <link href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet"
          type="text/css"/>

<body>
<!-- Navigation -->
<div th:replace="~{fragments/navbar :: navbar('no', 'no', 'no', 'yes', 'yes', 'yes', 'yes', 'yes')}"></div>
<header class="masthead bg-primary text-white">
    <div class="container mt-5">
        <h2 class="text-center mb-4">📊 Expense Dashboard</h2>
        <div class="row justify-content-center mb-4">
            <div class="col-md-4">
                <form th:action="@{/setBudget}" method="post" class="d-flex gap-2">
                    <input type="number" name="budget" class="form-control"
                           placeholder="Set Monthly Budget" required>
                    <button class="btn btn-primary">Save</button>
                </form>
            </div>
        </div>
        <!-- ================= CARDS ================= -->
        <div class="row mb-4 justify-content-center">
            <div class="col-md-4">
                <div class="card shadow p-4 text-center">
                    <h6 class="text-muted">Total Expense</h6>
                    <h2 style="color:#0d6efd;">₹ <span id="totalExpense"></span></h2>
                </div>
            </div>
            <!-- Highest Category -->
            <div class="col-md-4">
                <div class="card shadow p-4 text-center">
                    <h6 class="text-muted">Top Category</h6>
                    <h2 th:text="${highestCategory}" style="color:#1cc88a;"></h2>
                </div>
            </div>
            <!-- This Month -->
            <div class="col-md-4">
                <div class="card shadow p-4 text-center">
                    <h6 class="text-muted">This Month</h6>
                    <h2 style="color:#f6c23e;">₹ <span th:text="${thisMonthExpense}"></span></h2>
                </div>
            </div>
        </div>

        <div class="row mb-4 justify-content-center">
            <div class="col-md-3">
                <input type="date" id="fromDate" class="form-control">
            </div>
            <div class="col-md-3">
                <input type="date" id="toDate" class="form-control">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="applyFilter()">Apply</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100" onclick="exportExcel()">
                    Export
                </button>
            </div>
        </div>

        <div th:if="${percent >= 100}" class="alert alert-danger text-center mt-3 text-dark">
            ❌ Budget exceeded! Control your spending!
        </div>

        <div th:if="${percent >= 80 and percent < 100}" class="alert alert-warning text-center mt-3 text-dark">
            ⚠ Warning: You are close to your budget limit!
        </div>

        <div th:if="${percent < 80}" class="alert alert-success text-center mt-3 text-dark">
            ✅ Good! Your spending is under control
        </div>
        <!-- ================= BUDGET SECTION ================= -->
        <div class="mt-4 text-dark">
            <h6>Budget Usage</h6>

            <div class="progress">
                <div class="progress-bar"
                     role="progressbar"
                     th:classappend="
                        ${percent < 80} ? 'bg-success' :
                        (${percent < 100} ? 'bg-warning' : 'bg-danger')"
                     th:style="'width:' + (${budget} > 0 ? (${thisMonthExpense} * 100 / ${budget}) : 0) + '%'">
                </div>
            </div>

            <p class="mt-2">
                ₹ <span th:text="${thisMonthExpense}"></span>
                /
                ₹ <span th:text="${budget}"></span>
            </p>

            <!-- OPTIONAL: agar budget set nahi hai -->
            <div th:if="${budget == 0}" class="text-danger mt-2">
                ⚠ Please set your budget first
            </div>
        </div>
        <!-- ================= CHARTS ================= -->
        <div class="row g-4">
            <!-- PIE CHART -->
            <div class="col-md-6">
                <div class="card p-4 shadow text-dark">
                    <h5 class="text-center mb-3">Category-wise</h5>
                    <div class="chart-box">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
            </div>
            <!-- BAR CHART -->
            <div class="col-md-6">
                <div class="card p-3 shadow">
                    <h5 class="text-center">Monthly</h5>
                    <div class="chart-box">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow p-4 text-center">
                    <h6 class="text-muted">Income</h6>
                    <h2 style="color:#36b9cc;">₹ <span th:text="${income}"></span></h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow p-4 text-center">
                    <h6 class="text-muted">Savings</h6>

                    <!-- Green if positive -->
                    <h2 th:if="${savings >= 0}" style="color:#1cc88a;">
                        ₹ <span th:text="${savings}"></span>
                    </h2>

                    <!-- Red if negative -->
                    <h2 th:if="${savings < 0}" style="color:#e74a3b;">
                        ₹ <span th:text="${savings}"></span>
                    </h2>
                </div>
            </div>
        </div>
    </div>
